openapi: 3.0.0
info:
  title: Atmani project API
  description: Atmani project APIs 
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
    description: Main production server

paths:
  /products:
    get:
      summary: Returns a list of products
      operationId: getProducts
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductDTO'
    
    post:
      summary: Add a new product
      operationId: addProduct
      requestBody:
        description: Product object that needs to be created
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductDTO'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDTO'

  /products/{id}:
    get:
      summary: Get product by ID
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDTO'
    
    put:
      summary: Update product
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: integer
            format: int64
      requestBody:
        description: Product object that needs to be updated
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductDTO'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDTO'
    
    delete:
      summary: Delete product by ID
      operationId: deleteProductById
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted successfully (no content)

  /categories:
    get:
      summary: Returns a list of categories
      operationId: getCategories
      responses:
        '200':
          description: A list of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryDTO'
    
    post:
      summary: Add a new category
      operationId: addCategory
      requestBody:
        description: Category object that needs to be created
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryDTO'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDTO'

  /categories/{id}:
    get:
      summary: Get category by ID
      operationId: getCategoryById
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Category information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDTO'
    
    put:
      summary: Update existing category
      operationId: updateCategory
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
            format: int64
      requestBody:
        description: Category object that needs to be updated
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryDTO'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDTO'
    
    delete:
      summary: Delete category by ID
      operationId: deleteCategoryById
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Category deleted successfully (no content)

components:
  schemas:
    ProductDTO:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          description: The unique identifier for a product.
          example: 10
        name:
          type: string
          description: The product's name.
          example: fountain
        productImages:
          type: array
          description: The images info.
          items:
           $ref : '#/components/schemas/ImageDTO'
        description:
          type: string
          description: The product's description.
          example: Black rectangular fountain
        colors:
          type: array
          items:
            type: string
        categoryName:
          type: string
          description: the category name
        shape:
          type: string

        price:
          type: integer
          format: int64
          description: The product's price.
          example: 100
    
    CategoryDTO:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          description: The unique identifier for a category.
          example: 10
        name:
          type: string
          description: The category's name.
          example: fountains
        categoryImage:
          $ref: '#/components/schemas/ImageDTO'
        description:
          type: string
          description: The category's description.
          example: Black rectangular fountain

    ImageDTO:
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
          description: the url to retrieve the image
        isPrimary:
          type: boolean
          description: To indicate whether it's the main image
        altText:
          type: string
          description: Description of the image
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          example: 404
        message:
          type: string
          example: "Product not found"
